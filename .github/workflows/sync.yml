name: Sync upstream

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - UPSTREAM: 'openwrt'
            BRANCH: '24.10'
          - UPSTREAM: 'openwrt'
            BRANCH: '25.12'
          - UPSTREAM: 'openwrt'
            BRANCH: 'master'

          - UPSTREAM: 'coolsnowwolf'
            BRANCH: 'master'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          path: workdir
          fetch-depth: 0

      - name: Checkout upstream
        uses: actions/checkout@v5
        with:
          path: upstream
          repository: ${{ matrix.UPSTREAM }}/packages
          ref: ${{ matrix.BRANCH != 'master' && 'openwrt-' || '' }}${{ matrix.BRANCH }}
          fetch-depth: 1

      - name: Confugure git
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'noreply@github.com'

      - name: Prepare branch
        run: |
          cd workdir
          git switch --orphan ${{ matrix.UPSTREAM }}-${{ matrix.BRANCH }} || git switch ${{ matrix.UPSTREAM }}-${{ matrix.BRANCH }}
          rm -rf ./*
      
      - name: Sync files
        run: |
          cd workdir
          cp -r ../upstream/lang/golang/* ./

      - name: Commit and push changes
        run: |
          cd workdir
          git add .
          git commit -m "Sync from ${{ matrix.UPSTREAM }}/packages:${{ matrix.BRANCH }}" || echo "No changes to commit"
          git push origin ${{ matrix.UPSTREAM }}-${{ matrix.BRANCH }} --force
